spring:
  application:
    name: binance-quote-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:binance_quotes}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 5000
  sql:
    init:
      mode: always
      continue-on-error: false
  jackson:
    generator:
      write-big-decimal-as-plain: true

server:
  port: ${SERVER_PORT:18080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.quant.binancequotes: DEBUG

app:
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - DOGEUSDT
    - ADAUSDT
    - TRXUSDT
    - LINKUSDT
    - AVAXUSDT

binance:
  ws:
    # USDT-M Perpetuals stream. SPOT @bookTicker does not include event time (E) or
    # transaction time (T); perps @bookTicker does. See docs/design_decisions.md DD-10.
    base-url: wss://fstream.binance.com
    staleness-threshold-ms: 30000

persistence:
  queue-capacity: 10000
  batch-size: 200
  flush-ms: 500
  shutdown-timeout-ms: 5000
  drop-oldest-threshold: 0.9
