spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:binance_quotes_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.quant.binancequotes: DEBUG

persistence:
  insert-sql: >
    MERGE INTO quotes (symbol, bid_price, bid_size, ask_price, ask_size,
                       update_id, event_time, transaction_time, received_at)
    KEY (symbol, update_id)
    VALUES (:symbol, :bid, :bidSize, :ask, :askSize,
            :updateId, :eventTime, :transactionTime, :receivedAt)
