services:
  postgres:
    image: postgres:16-alpine
    container_name: binance-quote-db
    environment:
      POSTGRES_DB: ${DB_NAME:-binance_quotes}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-binance_quotes}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - binance-quote-net

  app:
    build: .
    container_name: binance-quote-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-binance_quotes}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "18080:18080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:18080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - binance-quote-net

volumes:
  pgdata:

networks:
  binance-quote-net:
    driver: bridge
